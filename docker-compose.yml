version: '3.8'
services:
    app:
        build:
            context: ./
            dockerfile: app.dockerfile
        working_dir: /var/www
        container_name: eestec-laravel-app
        volumes:
            - ./:/var/www
        depends_on:
            - "database"
    web:
      build:
          context: ./
          dockerfile: web.dockerfile
      working_dir: /var/www
      container_name: eestec-web-server
      volumes:
          - ./:/var/www
      ports:
          - 8000:80
    database:
      image: mariadb
      container_name: eestec-database
      environment:
        MYSQL_DATABASE: web
        MYSQL_ROOT_PASSWORD: root
        MYSQL_PASSWORD: password
        MYSQL_USER: user
      ports:
        - 33061:3306
      volumes:
        - data:/var/lib/mysql
    pma:
      image: phpmyadmin:5.1
      container_name: eestec-phpmyadmin
      environment:
          - PMA_ARBITRARY=1
          - PMA_HOST=172.0.0.1
          - PMA_USER=root
          - PMA_PASSWORD=root
          - PMA_PORT=3306
      depends_on:
          - database
      ports:
          - 8888:80
volumes:
    data: